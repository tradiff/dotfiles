
- link:
    ~/.zshrc: .zshrc
    ~/.p10k.zsh: .p10k.zsh
    ~/.tmux.conf: .tmux.conf
    ~/.config/tmuxinator: tmuxinator
    ~/.config/nvim: nvim
    ~/.gitconfig: .gitconfig
    ~/.gitignore_global: .gitignore_global
    ~/.config/kitty: kitty
    ~/.config/starship.toml: starship.toml
    ~/.config/wezterm: wezterm
    ~/.config/alacritty: alacritty
    ~/.config/karabiner/karabiner.json:
      if: "uname | grep -qx Darwin"
      path: karabiner/karabiner.json
    ~/.config/yabai/yabairc:
      if: "uname | grep -qx Darwin"
      path: yabai/yabairc
    ~/.config/skhd/skhdrc:
      if: "uname | grep -qx Darwin"
      path: skhd/skhdrc
    ~/.config/hypr:
      if: "uname | grep -qx Linux"
      path: hypr
    ~/.config/rofi:
      if: "uname | grep -qx Linux"
      path: rofi
    ~/.config/dunst:
      if: "uname | grep -qx Linux"
      path: dunst
    ~/.config/waybar:
      if: "uname | grep -qx Linux"
      path: waybar
    ~/.config/awesome:
      if: "uname | grep -qx Linux"
      path: awesome
    ~/.xprofile:
      if: "uname | grep -qx Linux"
      path: xorg/.xprofile
    ~/bin:
      if: "uname | grep -qx Linux"
      path: bin
    ~/.config/espanso:
      if: "uname | grep -qx Linux"
      path: espanso
    ~/.config/wireplumber:
      if: "uname | grep -qx Linux"
      path: wireplumber
    ~/.config/zellij:
      path: zellij
    ~/.config/ruby:
      path: ruby
    ~/.config/wlogout: wlogout
    ~/.config/fontconfig: fontconfig
    ~/.config/ghostty: ghostty
    ~/.config/plasma-workspace/env: plasma-workspace/env
    ~/.psqlrc: .psqlrc
    ~/.config/atuin/config.toml: atuin/config.toml
    ~/.local/share/aurorae/themes/catppuccin-travis: aurorae/themes/catppuccin-travis
    ~/.config/fish: fish

- shell:
    - description: Switch to zsh
      command: "echo $SHELL | grep $(which zsh) || sudo chsh -s $(which zsh) $(whoami)"

- shell:
    - description: Install oh-my-zsh
      command: '[ -d "$HOME/.oh-my-zsh" ] || git clone https://github.com/ohmyzsh/ohmyzsh.git "$HOME/.oh-my-zsh"'

- create:
    - ~/.oh-my-zsh/custom/plugins

- shell:
    - description: Install zsh-syntax-highlighting plugin
      command: '[ -d "$HOME/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting" ] || git clone https://github.com/zsh-users/zsh-syntax-highlighting.git "$HOME/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"'
    - description: Install zsh-autosuggestions plugin
      command: '[ -d "$HOME/.oh-my-zsh/custom/plugins/zsh-autosuggestions" ] || git clone https://github.com/zsh-users/zsh-autosuggestions "$HOME/.oh-my-zsh/custom/plugins/zsh-autosuggestions"'
    - description: Install zsh-completions plugin
      command: '[ -d "$HOME/.oh-my-zsh/custom/plugins/zsh-completions" ] || git clone https://github.com/zsh-users/zsh-completions.git "$HOME/.oh-my-zsh/custom/plugins/zsh-completions"'
    - description: Install gradle-completion plugin
      command: '[ -d "$HOME/.oh-my-zsh/custom/plugins/gradle-completion" ] || git clone https://github.com/gradle/gradle-completion.git "$HOME/.oh-my-zsh/custom/plugins/gradle-completion"'
    - description: Install fzf-tab plugin
      command: '[ -d "$HOME/.oh-my-zsh/custom/plugins/fzf-tab" ] || git clone https://github.com/Aloxaf/fzf-tab "$HOME/.oh-my-zsh/custom/plugins/fzf-tab"'
